<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl">alternate_email</span>
<input class="w-full bg-surface-container-lowest border-transparent focus:border-primary/50 focus:ring-4 focus:ring-primary/10 rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-on-surface-variant/30 font-body text-sm transition-all duration-300 outline-none" placeholder="neural@synapse.ai" type="email"/>
</div>
</div>
<!-- Password Field -->

<div class="flex justify-between items-center px-4">
<label class="block text-[10px] font-label uppercase tracking-widest text-on-surface-variant">Password</label>
